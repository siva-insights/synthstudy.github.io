<!DOCTYPE html>
<html>
<head>
  <title>Synthetic Experimental Data Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 12px;
    }

    .cite-button-wrap {
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 18px;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
    }

    .modal-content {
      background: white;
      width: 620px;
      max-width: 90%;
      margin: 100px auto;
      padding: 25px;
      border-radius: 10px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 15px;
    }

    .close {
      font-size: 28px;
      cursor: pointer;
    }

    .citation-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 15px;
      margin: 18px 0;
      line-height: 1.4;
    }

    .citation-style {
      font-weight: bold;
      color: #555;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>SYNTHETIC EXPERIMENTAL DATA GENERATOR</h1>

    <div class="cite-button-wrap">
      <button onclick="showCitations()">Cite this generator</button>
    </div>

    <label for="studyName">Study Name:</label>
    <input type="text" id="studyName" placeholder="Enter study name">
  </div>

  <div id="citationModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Cite</h2>
        <span class="close" onclick="closeCitations()">&times;</span>
      </div>

      <div id="citationContent"></div>
    </div>
  </div>

  <script>
    function showCitations() {
      const studyName = document.getElementById("studyName").value.trim() || "Synthetic Experimental Data Generator";
      const author = "Siva Shanmugam Mariappan";
      const year = new Date().getFullYear();

      document.getElementById("citationContent").innerHTML = `
        <div class="citation-row">
          <div class="citation-style">MLA</div>
          <div>${author}. "${studyName}." <i>Synthetic Experimental Data Generator</i>, ${year}.</div>
        </div>

        <div class="citation-row">
          <div class="citation-style">APA</div>
          <div>Mariappan, S. S. (${year}). <i>${studyName}</i>. Synthetic Experimental Data Generator.</div>
        </div>

        <div class="citation-row">
          <div class="citation-style">Chicago</div>
          <div>Mariappan, Siva Shanmugam. "${studyName}." <i>Synthetic Experimental Data Generator</i>, ${year}.</div>
        </div>
      `;

      document.getElementById("citationModal").style.display = "block";
    }

    function closeCitations() {
      document.getElementById("citationModal").style.display = "none";
    }
  </script>
</body>
</html>
