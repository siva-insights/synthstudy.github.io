<!DOCTYPE html>
<html>
<head>
  <title>Open LLM Synthetic Experimental Data Generator</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; color: #1f2937; }
    .container { max-width: 850px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
    h1 { text-align: center; color: #1e3a8a; margin-bottom: 12px; }
    .cite-button-wrap { text-align: center; margin-bottom: 30px; }
    label { font-weight: bold; display: block; margin-top: 18px; margin-bottom: 6px; }
    input[type="text"], input[type="number"], textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
    textarea { min-height: 90px; resize: vertical; }
    .input-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .input-table td { padding: 10px; vertical-align: middle; }
    .input-table td:first-child { width: 40%; font-weight: bold; }
    .section { margin-top: 25px; padding: 20px; background: #eef4ff; border-left: 5px solid #2563eb; border-radius: 8px; }
    .condition-card, .question-card { margin-top: 16px; padding: 15px; background: white; border: 1px solid #dbeafe; border-radius: 8px; }
    .note { margin-top: 8px; font-size: 14px; color: #475569; background: #f8fafc; padding: 10px; border-radius: 8px; }
    .scale-option-row { display: grid; grid-template-columns: 150px 1fr; gap: 12px; align-items: center; margin-top: 10px; }
    .radio-options label { font-weight: normal; display: block; margin-top: 8px; }
    .action-buttons { margin-top: 25px; }
    button { margin-top: 20px; background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-right: 8px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }

    .download-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
    .download-card { display: block; text-decoration: none; background: white; border: 1px solid #cbd5e1; border-radius: 10px; padding: 16px; color: #1f2937; transition: 0.2s; }
    .download-card:hover { border-color: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); }
    .download-title { font-weight: bold; color: #1e3a8a; margin-bottom: 4px; }
    .download-subtitle { font-size: 14px; color: #64748b; }
    .helper-buttons { margin-top: 16px; }
    .add-question-wrap { margin-top: 12px; }

    .preview-box { margin-top: 25px; padding: 16px; background: #ffffff; border: 2px solid #2563eb; border-radius: 10px; }
    .preview-title { font-size: 20px; font-weight: bold; color: #1e3a8a; margin-bottom: 8px; }
    .preview-stimuli { line-height: 1.4; background: #f8fafc; padding: 12px; border-radius: 8px; }
    .preview-question { margin: 8px 0; padding: 10px; background: white; border: 1px solid #cbd5e1; border-radius: 8px; }
    .scale-radio { display: inline-flex; align-items: center; gap: 4px; margin-right: 16px; margin-top: 8px; font-weight: normal; }
    .preview-nav { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
    .preview-counter { font-weight: bold; color: #475569; }

    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.35); }
    .modal-content { background: white; width: 620px; max-width: 90%; margin: 100px auto; padding: 25px; border-radius: 10px; }
    .modal-header { display: flex; justify-content: space-between; border-bottom: 1px solid #e5e7eb; margin-bottom: 15px; }
    .close { font-size: 28px; cursor: pointer; }
    .citation-row { display: grid; grid-template-columns: 90px 1fr; gap: 15px; margin: 18px 0; line-height: 1.4; }
    .citation-style { font-weight: bold; color: #555; }

    .tooltip {
      display: inline-block;
      margin-left: 6px;
      background: #2563eb;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      text-align: center;
      font-size: 12px;
      line-height: 18px;
      cursor: help;
      position: relative;
    }
    
    .tooltip .tooltip-text {
      visibility: hidden;
      width: 330px;
      background: #1f2937;
      color: white;
      text-align: left;
      padding: 10px;
      border-radius: 8px;
      position: absolute;
      z-index: 10;
      top: 25px;
      left: 0;
      font-size: 13px;
      line-height: 1.4;
    }
    
    .tooltip:hover .tooltip-text {
      visibility: visible;
    }
    
    .model-limit {
      font-size: 13px;
      color: #64748b;
      margin-left: 24px;
    }
    
    .input-estimate-box {
      margin-top: 20px;
      padding: 14px;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-weight: bold;
      color: #1e3a8a;
    }
    
    .progress-container {
      margin-top: 15px;
      background: #e5e7eb;
      border-radius: 999px;
      height: 18px;
      overflow: hidden;
    }
    
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      margin-top: 10px;
      font-weight: bold;
      color: #475569;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .question-header label {
      margin-top: 0;
    }
    
    .duplicate-question-btn {
      margin-top: 0;
      padding: 8px 12px;
      font-size: 13px;
      background: #0f766e;
    }
    
    .duplicate-question-btn:hover {
      background: #115e59;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>OPEN LLM SYNTHETIC EXPERIMENTAL DATA GENERATOR (OLSEDG)</h1>

    <div class="cite-button-wrap">
      <button onclick="showCitations()">Cite this generator</button>
    </div>

    <div class="section">
      <h2>
        Local Setup and Model Settings
      </h2>

      <label>
        Download OLSEDG Helper
        <span class="tooltip">?
          <span class="tooltip-text">
            OLSEDG Helper connects this website to your locally installed Ollama models. It checks whether the selected model is available, manages response generation, tracks progress, and saves outputs directly to your computer. All generation runs locally.
          </span>
        </span>
      </label>
      
      <div class="download-grid">
        <a class="download-card" href="https://github.com/siva-insights/synthstudy.github.io/releases/download/v1.2/OLSEDG-Helper.zip" download>
          <div class="download-title">Download OLSEDG Helper for Mac</div>
        </a>

        <a class="download-card" href="https://github.com/siva-insights/synthstudy.github.io/releases/download/v1.1/OLSEDG-Helper.zip" download>
          <div class="download-title">Download OLSEDG Helper for Windows</div>
        </a>
      </div>
      
      <label>
        Select the language model for response generation:
        <span class="tooltip">?
          <span class="tooltip-text">
            Approximate context limits:<br>
            qwen2.5:14b: 40,960 tokens ≈ 30,000 words<br>
            qwen2.5:7b: 40,960 tokens ≈ 30,000 words<br>
            llama3.1:8b: 131,072 tokens ≈ 98,000 words<br>
            qwen3:14b: 40,960 tokens ≈ 30,000 words<br>
            mistral-small3.2:24b: 131,072 tokens ≈ 98,000 words<br>
            gemma3:12b: 131,072 tokens ≈ 98,000 words<br>
            deepseek-r1:14b: 131,072 tokens ≈ 98,000 words
          </span>
        </span>
      </label>
      <div class="radio-options">
        <label><input type="radio" name="modelChoice" value="qwen2.5:14b" onchange="updateInputEstimate()"> qwen2.5:14b</label>
        <label><input type="radio" name="modelChoice" value="qwen2.5:7b" onchange="updateInputEstimate()"> qwen2.5:7b</label>
        <label><input type="radio" name="modelChoice" value="llama3.1:8b" onchange="updateInputEstimate()"> llama3.1:8b</label>
        <label><input type="radio" name="modelChoice" value="qwen3:14b" onchange="updateInputEstimate()"> qwen3:14b</label>
        <label><input type="radio" name="modelChoice" value="mistral-small3.2:24b" onchange="updateInputEstimate()"> mistral-small3.2:24b</label>
        <label><input type="radio" name="modelChoice" value="gemma3:12b" onchange="updateInputEstimate()"> gemma3:12b</label>
        <label><input type="radio" name="modelChoice" value="deepseek-r1:14b" onchange="updateInputEstimate()"> deepseek-r1:14b</label>
      </div>

      <label for="temperature">
        Response Randomness / Temperature:
        <span class="tooltip">?
          <span class="tooltip-text">
            The Twin-2K-500 dataset contains 2,058 unique personas. If your requested sample size exceeds the number of unique personas, some personas may be reused. Setting temperature above 0 can help produce less repetitive responses from repeated personas.
          </span>
        </span>
      </label>
      <input type="number" id="temperature" min="0" max="2" step="0.1" value="0">

      <div class="helper-buttons">
        <button onclick="checkSetup()">Validate Setup</button>
      </div>

      <div id="helperStatus" class="note"></div>
    </div>

    <div class="section">
      <h2>Study Setup</h2>
      <table class="input-table">
        <tr>
          <td><label for="studyName">Study Name:</label></td>
          <td><input type="text" id="studyName" placeholder="Enter study name"></td>
        </tr>

        <tr>
          <td><label for="conditionCount">Enter Number of Conditions:</label></td>
          <td>
            <input type="number" id="conditionCount" min="1" max="20"
              placeholder="Enter number of conditions"
              oninput="showConditionInputs(); updateInputEstimate();">
          </td>
        </tr>

        <tr>
          <td><label for="sampleCount">Enter Required Number of Samples per Condition:</label></td>
          <td><input type="number" id="sampleCount" min="1" placeholder="Enter samples per condition"></td>
        </tr>
      </table>
    </div>

    <div id="conditionFields"></div>

    <div class="section">
      <h2>Questions</h2>
      <div id="questionFields"></div>

      <div id="addQuestionButtonContainer" class="add-question-wrap">
        <button onclick="addQuestion()">+ Add Question</button>
      </div>
    </div>

    <div id="inputEstimateBox" class="input-estimate-box">
      Approximate input size: Not calculated yet
    </div> 
    
    <div class="action-buttons">
      <button onclick="showPreview()">Preview</button>
      <button onclick="generateResponses()">Generate</button>
    </div>

    <div id="previewArea"></div>
  </div>

  <div id="citationModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Cite</h2>
        <span class="close" onclick="closeCitations()">&times;</span>
      </div>
      <div id="citationContent"></div>
    </div>
  </div>

  <script>
    let previews = [];
    let currentPreviewIndex = 0;
    let questionCount = 0;

    function countWords(text) {
      if (!text) return 0;
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function addQuestion(prefill = null) {
      questionCount++;
      const container = document.getElementById("questionFields");
    
      const questionHtml = `
        <div class="question-card" id="questionCard${questionCount}">
          <div class="question-header">
            <label>Question {Q${questionCount}}:</label>
            <button type="button" class="duplicate-question-btn" onclick="duplicateQuestion(${questionCount})">
              Duplicate Question
            </button>
          </div>
    
          <input type="text"
            id="question${questionCount}"
            oninput="updateInputEstimate()"
            placeholder="Enter question ${questionCount}">
    
          <label>What response scale would you like to use for this question?</label>
          <input type="number" min="2" max="20"
            id="question${questionCount}ScaleCount"
            placeholder="Enter number of response scale points"
            oninput="showScaleOptions(${questionCount}, this.value)">
    
          <div id="question${questionCount}ScaleOptions"></div>
        </div>
      `;
    
      container.insertAdjacentHTML("beforeend", questionHtml);
    
      if (prefill) {
        document.getElementById(`question${questionCount}`).value = prefill.questionText || "";
    
        if (prefill.scaleCount && prefill.scaleCount >= 2) {
          document.getElementById(`question${questionCount}ScaleCount`).value = prefill.scaleCount;
    
          showScaleOptions(questionCount, prefill.scaleCount);
    
          for (let s = 1; s <= prefill.scaleCount; s++) {
            const scaleInput = document.getElementById(`question${questionCount}Scale${s}`);
            if (scaleInput) {
              scaleInput.value = prefill.scaleLabels[s - 1] || "";
            }
          }
        }
      }
    
      updateInputEstimate();
    }

    function duplicateQuestion(sourceQuestionNumber) {
      const questionText = document.getElementById(`question${sourceQuestionNumber}`)?.value || "";
    
      const scaleCount = parseInt(
        document.getElementById(`question${sourceQuestionNumber}ScaleCount`)?.value
      ) || 0;
    
      const scaleLabels = [];
    
      for (let s = 1; s <= scaleCount; s++) {
        const label = document.getElementById(`question${sourceQuestionNumber}Scale${s}`)?.value || "";
        scaleLabels.push(label);
      }
    
      addQuestion({
        questionText: questionText,
        scaleCount: scaleCount,
        scaleLabels: scaleLabels
      });
    }

    async function checkSetup() {
      const selectedModel = document.querySelector('input[name="modelChoice"]:checked');
      const statusBox = document.getElementById("helperStatus");
    
      if (!selectedModel) {
        statusBox.innerHTML = "Please select a language model first.";
        return;
      }
    
      const modelName = selectedModel.value;
      statusBox.innerHTML = "Checking OLSEDG Helper, Ollama, and selected model...";
    
      try {
        const healthResponse = await fetch("http://localhost:8000/health");
        const healthData = await healthResponse.json();
    
        if (!healthData.helper_running) {
          statusBox.innerHTML = "❌ OLSEDG Helper is not responding. Please download and open OLSEDG Helper.";
          return;
        }
    
        const modelResponse = await fetch(`http://localhost:8000/check-model/${encodeURIComponent(modelName)}`);
        const modelData = await modelResponse.json();
    
        if (!modelData.ollama_running) {
          statusBox.innerHTML = `
            ❌ OLSEDG Helper is running, but Ollama is not running or not installed.<br>
            Please install/open Ollama before generating responses.
          `;
          return;
        }
    
        if (!modelData.ready_to_use) {
          statusBox.innerHTML = `
            ❌ OLSEDG Helper and Ollama are running, but <b>${modelName}</b> is not installed locally.<br>
            Please install this model in Ollama first.
          `;
          return;
        }
    
        statusBox.innerHTML = `
          ✅ Setup complete. OLSEDG Helper is running, Ollama is available, and <b>${modelName}</b> is ready to use.
        `;
    
      } catch (error) {
        statusBox.innerHTML = `
          ❌ OLSEDG Helper is not running.<br>
          Please download and open OLSEDG Helper, then click <b>Check Setup</b> again.
        `;
      }
    }
    
    function getModelWordLimit(modelName) {
      const limits = {
        "qwen2.5:14b": 30000,
        "qwen2.5:7b": 30000,
        "llama3.1:8b": 98000,
        "qwen3:14b": 30000,
        "mistral-small3.2:24b": 98000,
        "gemma3:12b": 98000,
        "deepseek-r1:14b": 98000
      };
    
      return limits[modelName] || null;
    }

    async function showEstimatedGenerationTime() {
      const selectedModel = document.querySelector('input[name="modelChoice"]:checked');
      const conditionCount = parseInt(document.getElementById("conditionCount").value);
      const sampleCount = parseInt(document.getElementById("sampleCount").value);
    
      if (!selectedModel || !conditionCount || !sampleCount) {
        return "";
      }
    
      const totalRespondents = conditionCount * sampleCount;
    
      try {
        const response = await fetch(
          `http://localhost:8000/estimate-time/${encodeURIComponent(selectedModel.value)}/${totalRespondents}`
        );
    
        const data = await response.json();
    
        if (data.has_history) {
          return `
            <p><strong>Estimated generation time:</strong> ${data.estimated_minutes} minutes
            <br><span style="color:#64748b;">Based on previous ${selectedModel.value} runs on this machine.</span></p>
          `;
        }
    
        return `
          <p><strong>Estimated generation time:</strong> Not available yet.
          <br><span style="color:#64748b;">OLSEDG will learn timing after this model completes at least one run.</span></p>
        `;
    
      } catch (error) {
        return "";
      }
    }
    
    function updateInputEstimate() {
      const selectedModel = document.querySelector('input[name="modelChoice"]:checked');
      const conditionCount = parseInt(document.getElementById("conditionCount")?.value) || 0;
    
      let maxStimuliWords = 0;
    
      for (let c = 1; c <= conditionCount; c++) {
        const stimuliText = document.getElementById(`condition${c}Stimuli`)?.value || "";
        maxStimuliWords = Math.max(maxStimuliWords, countWords(stimuliText));
      }
    
      let questionWords = 0;
    
      for (let q = 1; q <= questionCount; q++) {
        questionWords += countWords(document.getElementById(`question${q}`)?.value || "");
    
        const scaleCount = parseInt(document.getElementById(`question${q}ScaleCount`)?.value) || 0;
    
        for (let s = 1; s <= scaleCount; s++) {
          questionWords += countWords(document.getElementById(`question${q}Scale${s}`)?.value || "");
        }
      }
    
      const personaMaxWords = 3061;
      const estimatedTotalWords = personaMaxWords + maxStimuliWords + questionWords;
    
      let message = `
        Estimated prompt length per synthetic respondent: ${estimatedTotalWords.toLocaleString()} words
        <span class="tooltip">?
          <span class="tooltip-text">
            This estimate includes the longest condition stimulus, all survey questions, all response scale labels, and OLSEDG's maximum persona-summary length.
          </span>
        </span>
      `;
    
      if (selectedModel) {
        const limit = getModelWordLimit(selectedModel.value);
    
        if (limit) {
          message += `<br>Selected model approximate limit: ${limit.toLocaleString()} words`;
    
          if (estimatedTotalWords > limit) {
            message += `<br><span style="color:#dc2626;">Warning: Estimated input may exceed the selected model's approximate word limit.</span>`;
          } else {
            message += `<br><span style="color:#16a34a;">Estimated input is within the selected model's approximate word limit.</span>`;
          }
        }
      } else {
        message += `<br><span style="color:#64748b;">Select a model to compare this estimate against the model's approximate input limit.</span>`;
      }
    
      document.getElementById("inputEstimateBox").innerHTML = message;
    }
    
    function showConditionInputs() {
      const count = parseInt(document.getElementById("conditionCount").value);
      const container = document.getElementById("conditionFields");
      container.innerHTML = "";

      if (!count || count < 1) return;

      let html = `
        <div class="section">
          <h2>Stimuli</h2>

          <div class="note">
            <b>Instructions:</b> Enter only the stimuli here. Use placeholders such as
            <b>{Q1}</b>, <b>{Q2}</b>, etc. wherever you want questions to appear in the study.
            This version supports text input only. Input limits vary by model and are shown in the model selection section.
          </div>
      `;

      for (let i = 1; i <= count; i++) {
        html += `
          <div class="condition-card">
            <label>Enter stimuli for Condition ${i}:</label>
            <textarea id="condition${i}Stimuli" oninput="updateInputEstimate()" placeholder="Example: Intro text {Q1} follow-up text {Q2}"></textarea>
          </div>
        `;
      }

      html += `</div>`;
      container.innerHTML = html;
      document.getElementById("previewArea").innerHTML = "";
    }

    function addQuestion() {
      questionCount++;
      const container = document.getElementById("questionFields");

      const questionHtml = `
        <div class="question-card" id="questionCard${questionCount}">
          <label>Question {Q${questionCount}}:</label>
          <input type="text" id="question${questionCount}" oninput="updateInputEstimate()" placeholder="Enter question ${questionCount}">

          <label>What response scale would you like to use for this question?</label>
          <input type="number" min="2" max="20"
            id="question${questionCount}ScaleCount"
            placeholder="Enter number of response scale points"
            oninput="showScaleOptions(${questionCount}, this.value)">

          <div id="question${questionCount}ScaleOptions"></div>
        </div>
      `;

      container.insertAdjacentHTML("beforeend", questionHtml);
    }

    function showScaleOptions(questionNumber, scaleCountValue) {
      const scaleCount = parseInt(scaleCountValue);
      const container = document.getElementById(`question${questionNumber}ScaleOptions`);
      container.innerHTML = "";

      if (!scaleCount || scaleCount < 2) return;

      for (let s = 1; s <= scaleCount; s++) {
        const requiredText = (s === 1 || s === scaleCount) ? "required" : "optional";
        const requiredAttribute = (s === 1 || s === scaleCount) ? "required" : "";

        container.innerHTML += `
          <div class="scale-option-row">
            <label>Scale Point ${s} (${requiredText}):</label>
            <input type="text" ${requiredAttribute}
              id="question${questionNumber}Scale${s}"
              oninput="updateInputEstimate()"
              placeholder="Enter label for scale point ${s}">
          </div>
        `;
      }

      updateInputEstimate();
    }

    function getScaleLabels(questionNumber) {
      const scaleCount = parseInt(document.getElementById(`question${questionNumber}ScaleCount`)?.value);
      const scaleLabels = [];

      if (!scaleCount || scaleCount < 2) return scaleLabels;

      for (let s = 1; s <= scaleCount; s++) {
        const label = document.getElementById(`question${questionNumber}Scale${s}`)?.value.trim();
        if (label) scaleLabels.push(`${s}-${label}`);
      }

      return scaleLabels;
    }

    function buildQuestionPreview(questionNumber) {
      const question = document.getElementById(`question${questionNumber}`)?.value.trim() || "";
      const scaleLabels = getScaleLabels(questionNumber);

      let html = `<div class="preview-question">
        <div><strong>Q${questionNumber}: ${escapeHTML(question)}</strong></div>
        <div><strong>Response Scale:</strong></div>`;

      scaleLabels.forEach((label) => {
        html += `<label class="scale-radio">
          <input type="radio" name="previewQ${questionNumber}">
          ${escapeHTML(label)}
        </label>`;
      });

      html += `</div>`;
      return html;
    }

    function showPreview() {
      const conditionCount = parseInt(document.getElementById("conditionCount").value);
      const sampleCount = document.getElementById("sampleCount").value || "";
      previews = [];

      if (!conditionCount || conditionCount < 1) {
        alert("Please enter the number of conditions first.");
        return;
      }

      for (let c = 1; c <= conditionCount; c++) {
        let stimuli = document.getElementById(`condition${c}Stimuli`)?.value || "";
        let htmlStimuli = escapeHTML(stimuli);

        for (let q = 1; q <= questionCount; q++) {
          const questionHtml = buildQuestionPreview(q);
          const placeholder = new RegExp(`\\{Q${q}\\}`, "g");
          htmlStimuli = htmlStimuli.replace(placeholder, questionHtml);
        }

        previews.push({
          condition: c,
          sampleCount: sampleCount,
          html: htmlStimuli || "No stimuli entered for this condition."
        });
      }

      currentPreviewIndex = 0;
      renderPreview();
    }

    function renderPreview() {
      const preview = previews[currentPreviewIndex];
      const previewArea = document.getElementById("previewArea");

      previewArea.innerHTML = `
        <div class="preview-box">
          <div class="preview-title">Preview: Condition ${preview.condition}</div>
          <p><strong>Required Samples per Condition:</strong> ${escapeHTML(preview.sampleCount || "Not entered")}</p>
          <div class="preview-stimuli">${preview.html}</div>

          <div class="preview-nav">
            <button onclick="previousPreview()" ${currentPreviewIndex === 0 ? "disabled" : ""}>Previous</button>
            <span class="preview-counter">Condition ${currentPreviewIndex + 1} of ${previews.length}</span>
            <button onclick="nextPreview()" ${currentPreviewIndex === previews.length - 1 ? "disabled" : ""}>Next</button>
          </div>
        </div>
      `;
    }

    function nextPreview() {
      if (currentPreviewIndex < previews.length - 1) {
        currentPreviewIndex++;
        renderPreview();
      }
    }

    function previousPreview() {
      if (currentPreviewIndex > 0) {
        currentPreviewIndex--;
        renderPreview();
      }
    }

    async function generateResponses() {
      const selectedModel = document.querySelector('input[name="modelChoice"]:checked');
    
      if (!selectedModel) {
        alert("Please select a language model.");
        return;
      }
    
      const studyName = document.getElementById("studyName").value.trim();
      const conditionCount = parseInt(document.getElementById("conditionCount").value);
      const sampleCount = parseInt(document.getElementById("sampleCount").value);
      const temperature = parseFloat(document.getElementById("temperature").value);
    
      if (!studyName || !conditionCount || !sampleCount || questionCount < 1) {
        alert("Please complete study name, conditions, samples, and at least one question.");
        return;
      }
    
      const conditions = [];
    
      for (let c = 1; c <= conditionCount; c++) {
        conditions.push({
          condition_number: c,
          stimuli: document.getElementById(`condition${c}Stimuli`).value.trim()
        });
      }
    
      const questions = [];
    
      for (let q = 1; q <= questionCount; q++) {
        const questionText = document.getElementById(`question${q}`).value.trim();
        const scaleCount = parseInt(document.getElementById(`question${q}ScaleCount`).value);
    
        const scalePoints = [];
    
        for (let s = 1; s <= scaleCount; s++) {
          const label = document.getElementById(`question${q}Scale${s}`).value.trim();
          scalePoints.push(label);
        }
    
        questions.push({
          question_number: q,
          question_text: questionText,
          scale_points: scalePoints
        });
      }
    
      const payload = {
        study_name: studyName,
        model_name: selectedModel.value,
        temperature: temperature,
        sample_count_per_condition: sampleCount,
        conditions: conditions,
        questions: questions
      };
    
      const previewArea = document.getElementById("previewArea");
    
      const estimateHtml = await showEstimatedGenerationTime();

      previewArea.innerHTML = `
        <div class="preview-box">
          <div class="preview-title">Generating Synthetic Responses...</div>
          <p>This may take several minutes because OLSEDG generates one respondent at a time.</p>
          ${estimateHtml}
          <p style="color:#64748b;">
            Generated responses are continuously saved to your local <strong>OLSEDG_outputs</strong> folder. Once processing is complete, both the final response dataset and study-input document can be downloaded directly from this page.
          </p>
    
          <div class="progress-container">
            <div id="generationProgressBar" class="progress-bar"></div>
          </div>
    
          <div id="generationProgressText" class="progress-text">
            Starting generation...
          </div>
        </div>
      `;
    
      try {
        const response = await fetch("http://localhost:8000/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
    
        const data = await response.json();
    
        if (!data.success) {
          previewArea.innerHTML = `
            <div class="preview-box">
              <div class="preview-title">Generation Failed</div>
              <p>Could not start generation.</p>
            </div>
          `;
          return;
        }
    
        pollGenerationProgress(data.job_id);
    
      } catch (error) {
        previewArea.innerHTML = `
          <div class="preview-box">
            <div class="preview-title">Generation Failed</div>
            <p>OLSEDG Helper is not running or could not connect to Ollama.</p>
          </div>
        `;
      }
    }

    async function pollGenerationProgress(jobId) {
      const previewArea = document.getElementById("previewArea");
    
      const interval = setInterval(async () => {
        try {
          const response = await fetch(`http://localhost:8000/progress/${jobId}`);
          const data = await response.json();
    
          if (!data.success) {
            clearInterval(interval);
            return;
          }
    
          const completed = data.completed || 0;
          const total = data.total || 1;
          const pending = total - completed;
          const percent = Math.round((completed / total) * 100);
    
          const progressBar = document.getElementById("generationProgressBar");
          const progressText = document.getElementById("generationProgressText");
    
          if (progressBar) {
            progressBar.style.width = `${percent}%`;
          }
    
          const remainingMinutes = data.estimated_remaining_seconds
            ? Math.round(data.estimated_remaining_seconds / 60)
            : 0;
          
          if (progressText) {
            progressText.innerHTML = `
              ${completed}/${total} respondents completed.
              ${pending} pending.
              Progress: ${percent}%.
              <br>Estimated time remaining: ${remainingMinutes} minute(s).
            `;
          }
          
          if (data.status === "complete") {
            clearInterval(interval);
    
            previewArea.innerHTML = `
              <div class="preview-box">
                <div class="preview-title">Generation Complete</div>
                <p><strong>Total responses generated:</strong> ${data.total}</p>
    
                <a href="${data.csv_url}" download>
                  <button type="button">Download CSV Responses</button>
                </a>
    
                <a href="${data.docx_url}" download>
                  <button type="button">Download Study Inputs Word Doc</button>
                </a>
              </div>
            `;
          }
    
          if (data.status === "error") {
            clearInterval(interval);
    
            previewArea.innerHTML = `
              <div class="preview-box">
                <div class="preview-title">Generation Failed</div>
                <p>${data.message}</p>
              </div>
            `;
          }
    
        } catch (error) {
          clearInterval(interval);
    
          previewArea.innerHTML = `
            <div class="preview-box">
              <div class="preview-title">Generation Failed</div>
              <p>Lost connection to OLSEDG Helper.</p>
            </div>
          `;
        }
      }, 1000);
    }
    
    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function showCitations() {
      const studyName = document.getElementById("studyName").value.trim() || "Open LLM Synthetic Experimental Data Generator";
      const author = "Siva Shanmugam Mariappan";
      const year = new Date().getFullYear();

      document.getElementById("citationContent").innerHTML = `
        <div class="citation-row">
          <div class="citation-style">MLA</div>
          <div>${author}. "${studyName}." <i>Open LLM Synthetic Experimental Data Generator (OLSEDG)</i>, ${year}.</div>
        </div>
        <div class="citation-row">
          <div class="citation-style">APA</div>
          <div>Mariappan, S. S. (${year}). <i>${studyName}</i>. Open LLM Synthetic Experimental Data Generator (OLSEDG).</div>
        </div>
        <div class="citation-row">
          <div class="citation-style">Chicago</div>
          <div>Mariappan, Siva Shanmugam. "${studyName}." <i>Open LLM Synthetic Experimental Data Generator (OLSEDG)</i>, ${year}.</div>
        </div>
      `;

      document.getElementById("citationModal").style.display = "block";
    }

    function closeCitations() {
      document.getElementById("citationModal").style.display = "none";
    }

    async function checkHelper() {
      const statusBox = document.getElementById("helperStatus");
      statusBox.innerHTML = "Checking OLSEDG Helper...";

      try {
        const response = await fetch("http://localhost:8000/health");
        const data = await response.json();

        if (data.helper_running) {
          statusBox.innerHTML = "✅ OLSEDG Helper is running.";
        } else {
          statusBox.innerHTML = "❌ OLSEDG Helper is not responding.";
        }

      } catch (error) {
        statusBox.innerHTML = "❌ OLSEDG Helper is not running. Please open OLSEDG Helper first.";
      }
    }

    async function checkSelectedModel() {
      const selectedModel = document.querySelector('input[name="modelChoice"]:checked');
      const statusBox = document.getElementById("helperStatus");

      if (!selectedModel) {
        statusBox.innerHTML = "Please select a language model first.";
        return;
      }

      const modelName = selectedModel.value;
      statusBox.innerHTML = "Checking selected model...";

      try {
        const response = await fetch(`http://localhost:8000/check-model/${encodeURIComponent(modelName)}`);
        const data = await response.json();

        if (!data.ollama_running) {
          statusBox.innerHTML = "❌ Ollama is not running. Please start Ollama first.";
          return;
        }

        if (data.ready_to_use) {
          statusBox.innerHTML = `✅ ${modelName} is installed and ready to use.`;
        } else {
          statusBox.innerHTML = `❌ ${modelName} is not installed locally.`;
        }

      } catch (error) {
        statusBox.innerHTML = "❌ OLSEDG Helper is not running.";
      }
    }
  </script>
